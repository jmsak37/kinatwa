<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinatwa Sacco</title>

    <link rel="stylesheet" href="/static/css/style.css">

    <link id="favicon" rel="icon" type="image/png" href="/static/assets/kinatwa-icon.png">

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const faviconLink = document.getElementById("favicon");
            const faviconPath = "/static/assets/kinatwa-icon.png";

            function generateFallbackIcon() {
                const svg = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
                        <rect width="64" height="64" rx="12" ry="12" fill="#0b6b3a"/>
                        <circle cx="32" cy="22" r="10" fill="#ffffff"/>
                        <path d="M20 42c2-6 8-9 12-9s10 3 12 9" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
                        <text x="32" y="58" text-anchor="middle" font-size="12" font-family="Arial, sans-serif" font-weight="bold" fill="#ffffff">KS</text>
                    </svg>
                `;
                return "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);
            }

            const testImage = new Image();
            testImage.onload = function() {
                faviconLink.href = faviconPath;
            };
            testImage.onerror = function() {
                faviconLink.href = generateFallbackIcon();
            };
            testImage.src = faviconPath;
        });
    </script>
</head>

<body>
    <header class="main-header">
        <h1>KINATWA SACCO</h1>
    </header>

    <main class="container">
        <div id="flashContainer"></div>
    </main>
</body>

</html>
